name: WhatsApp QR Generator

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        default: 'qr'
        type: string

permissions:
  contents: write   # needed to git push qr.b64 back to the repo

jobs:
  generate-qr:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: cd backend && npm install

      - name: Install Chromium
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y chromium-browser fonts-noto-color-emoji

      - name: Restore WhatsApp session
        uses: actions/download-artifact@v4
        with:
          name: wa-session
          path: backend/.wwebjs_auth/
        continue-on-error: true

      - name: Configure git
        run: |
          git config user.name  "BulkWA Bot"
          git config user.email "bulkwa-bot@users.noreply.github.com"

      - name: Start QR generator and push QR to repo when ready
        env:
          PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium-browser
        run: |
          cd backend

          # Start node in background
          node generate-qr.js &
          NODE_PID=$!
          echo "Node started (PID $NODE_PID)"

          # Watch for qr.ready flag — poll every 2 seconds, up to 90s
          WAITED=0
          QR_PUSHED=false

          while [ $WAITED -lt 90 ]; do
            sleep 2
            WAITED=$((WAITED + 2))

            if [ -f qr.ready ]; then
              echo "✅ qr.ready detected after ${WAITED}s — pushing qr.b64 to repo..."

              cd ..   # back to repo root where qr.b64 was written

              if [ -f qr.b64 ]; then
                git add qr.b64
                git commit -m "chore: update QR code [skip ci]" || echo "Nothing to commit"
                git push origin HEAD:main
                echo "✅ qr.b64 pushed to repo successfully"
                QR_PUSHED=true
              else
                echo "❌ qr.b64 file not found at repo root"
              fi

              cd backend
              break
            fi

            echo "Waiting for QR... ${WAITED}s"
          done

          if [ "$QR_PUSHED" = false ]; then
            echo "❌ QR was not generated within 90 seconds"
          fi

          # Wait for the node scan-wait loop to finish
          wait $NODE_PID
          echo "Node process done"

      - name: Push scanned status (clear QR)
        if: always()
        run: |
          if [ -f qr.b64 ] && [ "$(cat qr.b64)" = "scanned" ]; then
            git add qr.b64
            git commit -m "chore: clear QR after scan [skip ci]" || true
            git push origin HEAD:main || true
          fi

      - name: Upload QR artifact (backup)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: whatsapp-qr
          path: backend/qr.png
          retention-days: 1
          overwrite: true

      - name: Upload log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: qr-log
          path: backend/qr.log
          retention-days: 3
          overwrite: true

      - name: Save WhatsApp session
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: wa-session
          path: backend/.wwebjs_auth/
          retention-days: 7
          overwrite: true

      - name: Save WA info
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: wa-info
          path: backend/wa-info.json
          retention-days: 7
          overwrite: true
        continue-on-error: true
