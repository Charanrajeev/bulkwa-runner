name: WhatsApp QR Generator

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        default: 'qr'
        type: string
      gist_id:
        description: 'GitHub Gist ID to update with QR (optional)'
        required: false
        default: ''
        type: string

jobs:
  generate-qr:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: cd backend && npm install

      - name: Install Chromium
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y chromium-browser fonts-noto-color-emoji

      - name: Restore WhatsApp session
        uses: actions/download-artifact@v4
        with:
          name: wa-session
          path: backend/.wwebjs_auth/
        continue-on-error: true

      - name: Generate QR and push to Gist
        env:
          PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium-browser
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GIST_ID: ${{ inputs.gist_id }}
          REPO: ${{ github.repository }}
        run: |
          cd backend
          node generate-qr.js

      - name: Output Gist ID
        if: always()
        run: |
          if [ -f backend/gist.id ]; then
            echo "GIST_ID=$(cat backend/gist.id)" >> $GITHUB_OUTPUT
            echo "QR Gist ID: $(cat backend/gist.id)"
          fi

      - name: Upload QR artifact (backup)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: whatsapp-qr
          path: backend/qr.png
          retention-days: 1
          overwrite: true

      - name: Upload QR log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: qr-log
          path: backend/qr.log
          retention-days: 3
          overwrite: true

      - name: Save WhatsApp session
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: wa-session
          path: backend/.wwebjs_auth/
          retention-days: 7
          overwrite: true

      - name: Save WA info
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: wa-info
          path: backend/wa-info.json
          retention-days: 7
          overwrite: true
        continue-on-error: true
