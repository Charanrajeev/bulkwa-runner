<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BulkWA — WhatsApp Bulk Messenger</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #1a1a24;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.15);
    --text: #f0f0f8;
    --muted: rgba(240,240,248,0.5);
    --green: #25D366;
    --green-dim: rgba(37,211,102,0.12);
    --green-glow: rgba(37,211,102,0.25);
    --accent: #7c6af7;
    --accent-dim: rgba(124,106,247,0.12);
    --danger: #ff5757;
    --warn: #ffa94d;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    top: -200px; left: -200px;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(37,211,102,0.06) 0%, transparent 70%);
    pointer-events: none;
  }
  body::after {
    content: '';
    position: fixed;
    bottom: -200px; right: -200px;
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(124,106,247,0.06) 0%, transparent 70%);
    pointer-events: none;
  }
  .auth-wrap {
    width: 100%;
    max-width: 420px;
    padding: 2rem;
    position: relative;
    z-index: 1;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 2.5rem;
    justify-content: center;
  }
  .logo-icon {
    width: 40px; height: 40px;
    background: var(--green);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
  }
  .logo-text {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.5rem;
    letter-spacing: -0.5px;
  }
  .logo-text span { color: var(--green); }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 2rem;
  }
  .tab-row {
    display: flex;
    background: var(--surface2);
    border-radius: 10px;
    padding: 4px;
    margin-bottom: 1.75rem;
  }
  .tab-btn {
    flex: 1;
    padding: 8px;
    border: none;
    border-radius: 7px;
    background: transparent;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    font-weight: 500;
    cursor: pointer;
    transition: all .2s;
  }
  .tab-btn.active {
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border2);
  }
  .form-group { margin-bottom: 1rem; }
  label {
    display: block;
    font-size: 0.82rem;
    color: var(--muted);
    margin-bottom: 6px;
    letter-spacing: 0.3px;
  }
  input[type=text], input[type=email], input[type=password] {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    outline: none;
    transition: border-color .2s;
  }
  input:focus { border-color: var(--green); }
  .btn-primary {
    width: 100%;
    padding: 11px;
    background: var(--green);
    color: #0a1f10;
    border: none;
    border-radius: 10px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 1rem;
    cursor: pointer;
    margin-top: 0.5rem;
    transition: all .2s;
    letter-spacing: 0.3px;
  }
  .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn-primary:active { transform: translateY(0); }
  .msg { font-size: 0.85rem; text-align: center; margin-top: 1rem; }
  .msg.err { color: var(--danger); }
  .msg.ok { color: var(--green); }
  #register-form { display: none; }
</style>
</head>
<body>
<div class="auth-wrap">
  <div class="logo">
    <div class="logo-icon">💬</div>
    <div class="logo-text">Bulk<span>WA</span></div>
  </div>
  <div class="card">
    <div class="tab-row">
      <button class="tab-btn active" onclick="switchTab('login')">Login</button>
      <button class="tab-btn" onclick="switchTab('register')">Register</button>
    </div>
    <div id="login-form">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="login-email" placeholder="you@example.com">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="login-pass" placeholder="••••••••">
      </div>
      <button class="btn-primary" onclick="doLogin()">Sign In</button>
      <div class="msg" id="login-msg"></div>
    </div>
    <div id="register-form">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="reg-name" placeholder="John Doe">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="reg-email" placeholder="you@example.com">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="reg-pass" placeholder="Min 6 characters">
      </div>
      <button class="btn-primary" onclick="doRegister()">Create Account</button>
      <div class="msg" id="reg-msg"></div>
    </div>
  </div>
</div>
<script>
  function switchTab(tab) {
    document.getElementById('login-form').style.display = tab==='login'?'block':'none';
    document.getElementById('register-form').style.display = tab==='register'?'block':'none';
    document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active', (tab==='login'&&i===0)||(tab==='register'&&i===1)));
  }
  function doLogin() {
    const email = document.getElementById('login-email').value.trim();
    const pass = document.getElementById('login-pass').value;
    const msg = document.getElementById('login-msg');
    if (!email || !pass) { msg.className='msg err'; msg.textContent='Please fill all fields.'; return; }
    const users = JSON.parse(localStorage.getItem('bwa_users')||'[]');
    const user = users.find(u=>u.email===email && u.pass===btoa(pass));
    if (!user) { msg.className='msg err'; msg.textContent='Invalid credentials.'; return; }
    localStorage.setItem('bwa_session', JSON.stringify({email: user.email, name: user.name, ts: Date.now()}));
    window.location.href = 'dashboard.html';
  }
  function doRegister() {
    const name = document.getElementById('reg-name').value.trim();
    const email = document.getElementById('reg-email').value.trim();
    const pass = document.getElementById('reg-pass').value;
    const msg = document.getElementById('reg-msg');
    if (!name||!email||!pass) { msg.className='msg err'; msg.textContent='Please fill all fields.'; return; }
    if (pass.length < 6) { msg.className='msg err'; msg.textContent='Password must be 6+ chars.'; return; }
    const users = JSON.parse(localStorage.getItem('bwa_users')||'[]');
    if (users.find(u=>u.email===email)) { msg.className='msg err'; msg.textContent='Email already registered.'; return; }
    users.push({name, email, pass: btoa(pass)});
    localStorage.setItem('bwa_users', JSON.stringify(users));
    msg.className='msg ok'; msg.textContent='Account created! Please login.';
    setTimeout(()=>switchTab('login'),1200);
  }
  // Auto-redirect if already logged in
  const sess = JSON.parse(localStorage.getItem('bwa_session')||'null');
  if (sess && (Date.now()-sess.ts) < 86400000*7) window.location.href='dashboard.html';
</script>
</body>
</html>
